        baseImponible:
          type: number
          format: double
          example: 1250.75
        iva:
          type: number
          format: double
          example: 0.21
        moneda:
          type: string
          example: EUR
        tipo:
          type: string
          example: ORDINARIA
        estado:
          type: string
          example: VALIDA
        fechaEmision:
          type: string
          format: date-time
          example: "2025-05-10T14:30:50Z"
        fechaDesdeFacturacion:
          type: string
          format: date
          example: "2025-04-01"
        fechaHastaFacturacion:
          type: string
          format: date
          example: "2025-05-01"

    FacturaCreateRequest:
      type: object
      required:
        - empresaId
        - numeroFactura
        - baseImponible
        - iva
        - moneda
        - tipo
        - estado
