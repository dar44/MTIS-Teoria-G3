openapi: 3.0.0
info:
  title: API REST - Facturación Electrónica G3
  version: 1.0.0
  description: |
    API REST para el los procesos de facturación electrónica.
    Todos los endpoints requieren la cabecera WSKey.

servers:
  - url: http://localhost:3000
    description: Servidor local

tags:
  - name: FlujoEmision
  - name: FlujoConsulta
  - name: Factura
  - name: Empresa
  - name: Validacion
  - name: GestorArchivos
  - name: GestorRespuestas
  - name: Comunicacion
  - name: Auditoria

paths:
  /flujo-emision/iniciar:
    post:
      tags:
        - FlujoEmision
      summary: Iniciar flujo de emisión de factura
      description: |
        Inicia el proceso completo de emisión de factura: valida WSKey, valida datos de entrada,
        consulta empresa, verifica coincidencia de datos, crea factura, genera XML/PDF,
        envía documentación y notifica el resultado.
      operationId: iniciarFlujoEmision
      parameters:
        - $ref: "#/components/parameters/WSKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmisionFacturaRequest"
      responses:
        "200":
          description: Flujo completado correctamente
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcesoEmisionResponse"
        "400":
          description: Datos de entrada inválidos
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: WSKey no válida
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Empresa no registrada
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error técnico en el flujo
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-router-controller: FlujoEmisionController

  /flujo-consulta/iniciar:
    post:
      tags:
        - FlujoConsulta
      summary: Iniciar flujo de consulta de factura
      description: |
        Inicia el proceso de consulta de factura: valida formato de entrada,
        verifica existencia de la factura, recupera sus datos detallados,
        formatea la respuesta en XML y devuelve el resultado o un error controlado.
      operationId: iniciarFlujoConsulta
      parameters:
        - $ref: "#/components/parameters/WSKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsultaFacturaRequest"
      responses:
        "200":
          description: Consulta completada correctamente
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcesoConsultaResponse"
        "400":
          description: Datos de entrada inválidos
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: WSKey no válida
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Factura no encontrada
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error técnico durante la consulta
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-router-controller: FlujoConsultaController

  /facturas:
    post:
      tags:
        - Factura
      summary: Crear factura
      description: Crea y persiste una factura en base de datos.
      operationId: crearFactura
      parameters:
        - $ref: "#/components/parameters/WSKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FacturaCreateRequest"
      responses:
        "201":
          description: Factura creada correctamente
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacturaResponse"
        "400":
          description: Datos de factura inválidos
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: WSKey no válida
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error al crear la factura
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-router-controller: FacturaController

  /facturas/{idFactura}:
    get:
      tags:
        - Factura
      summary: Recuperar datos detallados de factura
      description: Recupera los datos completos de una factura por su identificador.
      operationId: consultarFacturaDetalle
      parameters:
        - $ref: "#/components/parameters/WSKey"
        - $ref: "#/components/parameters/idFactura"
      responses:
        "200":
          description: Factura recuperada correctamente
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacturaResponse"
        "401":
          description: WSKey no válida
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Factura no encontrada
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-router-controller: FacturaController

  /facturas/{idFactura}/existencia:
    get:
      tags:
        - Factura
      summary: Consultar existencia de factura
      description: Verifica si una factura existe en el sistema.
      operationId: consultarExistenciaFactura
      parameters:
        - $ref: "#/components/parameters/WSKey"
        - $ref: "#/components/parameters/idFactura"
      responses:
        "200":
          description: Resultado de la verificación de existencia
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExistenciaFacturaResponse"
        "401":
          description: WSKey no válida
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-router-controller: FacturaController

  /facturas/{idFactura}/estado:
    get:
      tags:
        - Factura
      summary: Consultar estado de factura
      description: Devuelve el estado actual de una factura.
      operationId: consultarEstadoFactura
      parameters:
        - $ref: "#/components/parameters/WSKey"
        - $ref: "#/components/parameters/idFactura"
      responses:
        "200":
          description: Estado consultado correctamente
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstadoFacturaResponse"
        "401":
          description: WSKey no válida
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Factura no encontrada
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-router-controller: FacturaController

  /facturas/{idFactura}/actualizar-estado:
    post:
      tags:
        - Factura
      summary: Actualizar estado de factura
      description: Actualiza el estado de una factura existente.
      operationId: actualizarEstadoFactura
      parameters:
        - $ref: "#/components/parameters/WSKey"
        - $ref: "#/components/parameters/idFactura"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActualizarEstadoFacturaRequest"
      responses:
        "200":
          description: Estado actualizado correctamente
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensajeResponse"
        "400":
          description: Estado no válido
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: WSKey no válida
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Factura no encontrada
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-router-controller: FacturaController

  /empresas/{email}:
    get:
      tags:
        - Empresa
      summary: Consultar empresa
      description: Consulta una empresa registrada a partir de su email.
      operationId: consultarEmpresa
      parameters:
        - $ref: "#/components/parameters/WSKey"
        - $ref: "#/components/parameters/emailEmpresa"
      responses:
        "200":
          description: Empresa encontrada
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmpresaResponse"
        "401":
          description: WSKey no válida
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Empresa no encontrada
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-router-controller: EmpresaController

  /empresas/{email}/verificar-datos:
    post:
      tags:
        - Empresa
      summary: Verificar coincidencia de datos de empresa
      description: |
        Comprueba si los datos introducidos coinciden con los almacenados para la empresa
        identificada por su email.
      operationId: verificarDatosEmpresa
      parameters:
        - $ref: "#/components/parameters/WSKey"
        - $ref: "#/components/parameters/emailEmpresa"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerificarEmpresaRequest"
      responses:
        "200":
          description: Resultado de la verificación
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificacionResponse"
        "400":
          description: Datos de empresa inválidos
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: WSKey no válida
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Empresa no encontrada
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-router-controller: EmpresaController

  /validaciones/wskey:
    post:
      tags:
        - Validacion
      summary: Validar WSKey
      description: Valida la clave WSKey enviada por cabecera.
      operationId: validarWsKey
      parameters:
        - $ref: "#/components/parameters/WSKey"
      responses:
        "200":
          description: Resultado de la validación de la WSKey
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidacionResponse"
        "401":
          description: WSKey no válida
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-router-controller: ValidacionController

  /validaciones/datos-factura:
    post:
      tags:
        - Validacion
      summary: Validar datos de entrada de factura
      description: Valida la estructura y reglas de negocio de los datos de entrada.
      operationId: validarDatosFactura
      parameters:
        - $ref: "#/components/parameters/WSKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FacturaInput"
      responses:
        "200":
          description: Resultado de la validación de datos
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidacionResponse"
        "400":
          description: Datos inválidos
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: WSKey no válida
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-router-controller: ValidacionController

  /gestor-archivos/generar-xml/{idFactura}:
    post:
      tags:
        - GestorArchivos
      summary: Generar XML de la factura
      description: Genera el documento XML asociado a una factura.
      operationId: generarXmlFactura
      parameters:
        - $ref: "#/components/parameters/WSKey"
        - $ref: "#/components/parameters/idFactura"
      responses:
        "200":
          description: XML generado correctamente
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentoGeneradoResponse"
        "401":
          description: WSKey no válida
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Factura no encontrada
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error técnico al generar XML
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-router-controller: GestorArchivosController

  /gestor-archivos/generar-pdf/{idFactura}:
    post:
      tags:
        - GestorArchivos
      summary: Generar PDF de la factura
      description: Genera el documento PDF asociado a una factura.
      operationId: generarPdfFactura
      parameters:
        - $ref: "#/components/parameters/WSKey"
        - $ref: "#/components/parameters/idFactura"
      responses:
        "200":
          description: PDF generado correctamente
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentoGeneradoResponse"
        "401":
          description: WSKey no válida
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Factura no encontrada
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error técnico al generar PDF
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-router-controller: GestorArchivosController

  /comunicaciones/enviar:
    post:
      tags:
        - Comunicacion
      summary: Enviar comunicación
      description: |
        Envía una comunicación genérica. Puede usarse tanto para avisar a la empresa
        como para enviar documentación a la Agencia Tributaria.
      operationId: enviarComunicacion
      parameters:
        - $ref: "#/components/parameters/WSKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComunicacionRequest"
      responses:
        "200":
          description: Comunicación enviada correctamente
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensajeResponse"
        "400":
          description: Datos de comunicación inválidos
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: WSKey no válida
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error técnico al enviar la comunicación
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-router-controller: ComunicacionController

  /gestor-respuestas/generar-xml:
    post:
      tags:
        - GestorRespuestas
      summary: Formatear respuesta XML de factura
      description: Transforma la información de una factura al formato XML de salida.
      operationId: generarXmlRespuestaFactura
      parameters:
        - $ref: "#/components/parameters/WSKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerarXmlFacturaRequest"
      responses:
        "200":
          description: Respuesta XML generada correctamente
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaXmlFactura"
        "400":
          description: Datos de factura inválidos para la generación XML
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: WSKey no válida
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-router-controller: GestorRespuestasController

  /gestor-respuestas/notificar-error:
    post:
      tags:
        - GestorRespuestas
      summary: Generar mensaje de error controlado
      description: Construye un mensaje de error estandarizado para el flujo de consulta.
      operationId: notificarErrorConsulta
      parameters:
        - $ref: "#/components/parameters/WSKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorConsultaRequest"
      responses:
        "200":
          description: Mensaje de error generado correctamente
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Datos de error inválidos
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: WSKey no válida
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-router-controller: GestorRespuestasController

  /auditoria/eventos:
    post:
      tags:
        - Auditoria
      summary: Registrar evento de auditoría
      description: Registra un evento del sistema, por ejemplo un intento no autorizado.
      operationId: registrarEventoAuditoria
      parameters:
        - $ref: "#/components/parameters/WSKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuditoriaEventoRequest"
      responses:
        "201":
          description: Evento registrado correctamente
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensajeResponse"
        "400":
          description: Datos de auditoría inválidos
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: WSKey no válida
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-router-controller: AuditoriaController

  /auditoria/errores:
    post:
      tags:
        - Auditoria
      summary: Registrar error técnico
      description: Registra un error técnico producido durante el proceso.
      operationId: registrarErrorAuditoria
      parameters:
        - $ref: "#/components/parameters/WSKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuditoriaErrorRequest"
      responses:
        "201":
          description: Error registrado correctamente
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensajeResponse"
        "400":
          description: Datos de error inválidos
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: WSKey no válida
          headers:
            salida:
              $ref: "#/components/headers/salidaHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-router-controller: AuditoriaController

components:
  parameters:
    WSKey:
      name: WSKey
      in: header
      description: Clave de autenticación WSKey
      required: true
      style: simple
      explode: false
      schema:
        type: string

    idFactura:
      name: idFactura
      in: path
      description: Identificador único de la factura
      required: true
      style: simple
      explode: false
      schema:
        type: integer
        format: int64
        example: 123

    emailEmpresa:
      name: email
      in: path
      description: Email de la empresa
      required: true
      style: simple
      explode: false
      schema:
        type: string
