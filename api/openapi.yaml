        rutaPdf:
          type: string
          description: Ruta del documento PDF a adjuntar para la empresa
          example: /red/facturas/RECT-2025-001.pdf

    AlmacenamientoRedResponse:
      type: object
      properties:
        idFactura:
          type: integer
          format: int64
          description: Identificador de la factura cuyos documentos se almacenaron
          example: 456
        rutaDirectorioRed:
          type: string
          description: Ruta del directorio de red donde se almacenaron los documentos
          example: /red/facturas/456/
        archivosAlmacenados:
          type: array
          description: Lista de archivos almacenados en el directorio de red
          items:
            type: string
          example:
            - /red/facturas/456/RECT-2025-001.xml
            - /red/facturas/456/RECT-2025-001.pdf
        mensaje:
          type: string
          example: Documentos almacenados correctamente en el directorio de red

    ErrorResponse:
      type: object
      properties:
        codigo:
          type: string
          example: ERR-400
        mensaje:
          type: string
          example: Los datos introducidos no son válidos
        detalle:
          type: string
          example: El campo fechaEmision es obligatorio
