      required: true
      style: simple
      explode: false
      schema:
        type: string

    idFactura:
      name: idFactura
      in: path
      description: Identificador único de la factura
      required: true
      style: simple
      explode: false
      schema:
        type: integer
        format: int64
        example: 123

    emailEmpresa:
      name: email
      in: path
